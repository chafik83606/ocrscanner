# Codemagic — build iOS + upload App Store Connect
# Prérequis Codemagic :
#   - Team settings → Integrations → Developer Portal (clé API connectée)
#   - Code signing : soinzen_ios_distribution_cert + profil ocr_scanner

workflows:
  ios-release:
    name: OCR Scanner iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic-ios-release-v2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        provisioning_profiles:
          - ocr_scanner
        certificates:
          - soinzen_ios_distribution_cert
    scripts:
      - name: Set up Flutter
        script: |
          set -e
          echo "Workflow: ios-release (codemagic.yaml)"
          flutter config --no-enable-swift-package-manager
          rm -rf build/ios/SourcePackages || true
          rm -rf ~/Library/Caches/org.swift.swiftpm || true
          flutter clean
          flutter pub get

      - name: Install iOS CocoaPods
        script: |
          set -e
          cd ios
          pod install --repo-update
          cd ..

      - name: Set up code signing settings on Xcode project
        script: |
          set -e
          xcode-project use-profiles --project ios/Runner.xcodeproj
          echo "=== Provisioning profiles on build machine ==="
          for f in "$HOME/Library/MobileDevice/Provisioning Profiles"/*.mobileprovision; do
            [ -f "$f" ] || continue
            security cms -D -i "$f" -o /tmp/prov.plist 2>/dev/null || continue
            NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' /tmp/prov.plist 2>/dev/null || echo "?")
            APP_ID=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' /tmp/prov.plist 2>/dev/null || echo "?")
            echo "  - $NAME | $APP_ID"
          done

      - name: Prepare ExportOptions for IPA
        script: |
          set -e
          BUNDLE_ID="com.ctre2.ocrscanner"
          PROFILE_NAME=""
          for f in "$HOME/Library/MobileDevice/Provisioning Profiles"/*.mobileprovision; do
            [ -f "$f" ] || continue
            security cms -D -i "$f" -o /tmp/prov.plist 2>/dev/null || continue
            APP_ID=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' /tmp/prov.plist 2>/dev/null || echo "")
            echo "$APP_ID" | grep -q "$BUNDLE_ID" || continue
            PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' /tmp/prov.plist)
            break
          done
          if [ -z "$PROFILE_NAME" ]; then
            echo "ERROR: No App Store provisioning profile found for $BUNDLE_ID."
            echo "Upload the profile in Codemagic → Code signing → iOS provisioning profiles."
            exit 1
          fi
          echo "Export will use profile: $PROFILE_NAME"
          /usr/libexec/PlistBuddy -c "Set :provisioningProfiles:$BUNDLE_ID $PROFILE_NAME" ios/ExportOptions.plist

      - name: Build iOS IPA
        script: |
          set -e
          echo "=== Building iOS IPA ==="
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
          echo "=== Build finished ==="
          IPA_PATH=$(find build -name "*.ipa" -type f 2>/dev/null | head -n1)
          if [ -z "$IPA_PATH" ]; then
            echo "ERROR: flutter build ipa finished but no .ipa was produced."
            find build -maxdepth 4 -type f 2>/dev/null | head -80 || true
            exit 1
          fi
          echo "IPA ready: $IPA_PATH"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/**/*.ipa

    cache:
      cache_paths:
        - "$HOME/.pub-cache"
        - "$HOME/Library/Caches/CocoaPods"

    publishing:
      app_store_connect:
        auth: integration
        # Upload seulement — la soumission TestFlight se fait manuellement sur App Store Connect
        # (évite l'échec post-processing si infos bêta / conformité export pas encore remplies)
        submit_to_testflight: false
        submit_to_app_store: false
